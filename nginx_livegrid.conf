# /etc/nginx/sites-available/livegrid.ru
# livegrid.ru — React SPA (frontend) + Laravel API (backend)

##############################################################################
# HTTP → HTTPS redirect
##############################################################################
server {
    listen 80;
    listen [::]:80;
    server_name livegrid.ru www.livegrid.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

##############################################################################
# HTTPS — main block
##############################################################################
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name livegrid.ru www.livegrid.ru;

    # ─── SSL (managed by Certbot) ─────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/livegrid.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livegrid.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ─── Logging ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/livegrid.access.log;
    error_log  /var/log/nginx/livegrid.error.log warn;

    # ─── Compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 256;

    # ─── Limits ───────────────────────────────────────────────────────────
    client_max_body_size 20M;
    keepalive_timeout    65;

    # ─── Frontend root ────────────────────────────────────────────────────
    root /var/www/livegrid/backend/frontend/dist;
    index index.html;

    # -------------------------
    # API → Laravel
    # -------------------------
    location ^~ /api/ {
        root /var/www/livegrid/backend/public;
        index index.php;

        try_files $uri $uri/ @api_fallback;
    }

    location @api_fallback {
        root /var/www/livegrid/backend/public;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/livegrid/backend/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ ^/api/.*\.php$ {
        root /var/www/livegrid/backend/public;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # -------------------------
    # Sanctum (CSRF)
    # -------------------------
    location ^~ /sanctum/ {
        root /var/www/livegrid/backend/public;
        index index.php;

        try_files $uri /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/livegrid/backend/public/index.php;
            include fastcgi_params;
        }
    }

    # -------------------------
    # SPA
    # -------------------------

    # index.html — never cache; browser always fetches the latest entry point
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        add_header Expires       "0"                                   always;
    }

    # Vite-hashed assets — cache forever (hash changes on every rebuild)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        # SPA fallback always serves index.html — must not be cached
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        add_header Expires       "0"                                   always;
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
